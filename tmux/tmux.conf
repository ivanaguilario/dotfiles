set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Let apps (like opencode) receive modified keys (Shift+Enter, etc.).
set -g extended-keys on
set -g extended-keys-format csi-u

# Ensure selection/copy is handled by tmux per active pane.
set -g mouse on

# Tell tmux that Ghostty supports extended keys.
set -ga terminal-features "xterm-ghostty*:extkeys"
set -ga terminal-features "ghostty*:extkeys"

run '~/.tmux/plugins/tpm/tpm'
